<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Images IA - Gratuit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #aaa;
            margin-top: 10px;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .generator-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .generator-box label {
            display: block;
            font-size: 1em;
            color: #ccc;
            margin-bottom: 10px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1em;
            min-width: 200px;
            outline: 2px solid transparent;
            transition: 0.3s;
        }
        .input-group input:focus {
            outline: 2px solid #f7971e;
            background: rgba(255, 255, 255, 0.15);
        }
        .input-group input::placeholder {
            color: #888;
        }
        .input-group button {
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            color: #1a1a2e;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .input-group button:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 25px rgba(247, 151, 30, 0.4);
        }
        .result-box {
            margin-top: 30px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255,255,255,0.1);
            position: relative;
        }
        .result-box img {
            width: 100%;
            display: block;
            border-radius: 12px;
        }
        .result-box .placeholder {
            color: #666;
            text-align: center;
            padding: 40px;
        }
        .result-box .placeholder span {
            font-size: 3em;
            display: block;
            margin-bottom: 15px;
        }
        .ads-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.9em;
            text-align: center;
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #444;
            font-size: 0.85em;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .input-group input { min-width: 100%; }
            .input-group button { width: 100%; }
        }
        .loading {
            color: #f7971e;
            text-align: center;
            padding: 40px;
        }
        .loading span {
            font-size: 3em;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>✨ Générateur d'Images IA</h1>
        <p>Décris ton image en quelques mots et l'IA la crée gratuitement</p>
    </header>

    <div class="container">

        <div class="generator-box">
            <label for="prompt">✍️ Décris ton image :</label>
            <div class="input-group">
                <input type="text" id="prompt" placeholder="Ex: un prince dans le désert, style numérique">
                <button onclick="generateImage()">🎨 Générer</button>
            </div>

            <div class="result-box" id="result">
                <div class="placeholder">
                    <span>🖼️</span>
                    <p>Une image apparaîtra ici</p>
                    <small style="color:#444;">Tape une description et clique sur Générer</small>
                </div>
            </div>
        </div>

        <!-- Zone publicitaire -->
        <div class="ads-section" id="ad-container">
            <p>📢 <span style="color:#666;">Ajoute ton code PropellerAds ici</span></p>
        </div>

        <footer class="footer">
            © 2026 Générateur IA — Créé avec ❤️
        </footer>
    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const resultDiv = document.getElementById('result');

            if (!prompt) {
                resultDiv.innerHTML = `
                    <div class="placeholder">
                        <span>⚠️</span>
                        <p>Veuillez décrire une image</p>
                        <small style="color:#444;">Ex: un coucher de soleil sur la plage</small>
                    </div>
                `;
                return;
            }

            resultDiv.innerHTML = `
                <div class="loading">
                    <span>⏳</span>
                    <p>Génération en cours...</p>
                    <small style="color:#444;">L'IA crée ton image, patience...</small>
                </div>
            `;

            try {
                // Utilisation de Craiyon (anciennement Dall-E mini) - GRATUIT et SANS CLÉ
                const response = await fetch('https://api.craiyon.com/v1/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                    })
                });

                if (!response.ok) {
                    throw new Error('Erreur API');
                }

                const data = await response.json();
                const imageUrl = data.images[0]; // Craiyon retourne une image en base64

                resultDiv.innerHTML = `
                    <img src="data:image/png;base64,${imageUrl}" alt="Image générée par IA">
                `;

            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = `
                    <div class="placeholder">
                        <span>😅</span>
                        <p>Erreur de génération</p>
                        <small style="color:#444;">Réessaie plus tard ou vérifie ta connexion</small>
                    </div>
                `;
            }
        }
    </script>

</body>
</html>
