<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>IA Magique - Générateur d'Images</title>
    <!-- Police Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* === Conteneur principal === */
        .container {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 40px 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            transition: 0.3s;
        }

        /* === EN-TÊTE === */
        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .header .badge {
            display: inline-block;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0b1a;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 6px 18px;
            border-radius: 40px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, #f7971e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .header p {
            color: #8888aa;
            font-size: 1.05rem;
            margin-top: 10px;
            font-weight: 400;
        }

        /* === BOX GÉNÉRATEUR === */
        .generator-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .generator-box label {
            display: block;
            font-weight: 600;
            color: #ccccee;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 16px 22px;
            border-radius: 60px;
            border: none;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: 2px solid transparent;
            transition: 0.3s;
            min-width: 200px;
        }

        .input-group input::placeholder {
            color: #666688;
        }

        .input-group input:focus {
            outline: 2px solid #f7971e;
            background: rgba(255, 255, 255, 0.12);
        }

        .input-group button {
            padding: 16px 38px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #0b0b1a;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .input-group button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(247, 151, 30, 0.35);
        }

        /* === ZONE RÉSULTAT === */
        .result-box {
            margin-top: 28px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.35);
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255, 255, 255, 0.06);
            position: relative;
            transition: 0.3s;
        }

        .result-box img {
            width: 100%;
            display: block;
            border-radius: 24px;
        }

        .placeholder {
            color: #555577;
            text-align: center;
            padding: 40px 20px;
        }

        .placeholder span {
            font-size: 3.6rem;
            display: block;
            margin-bottom: 12px;
        }

        .placeholder p {
            font-size: 1rem;
            color: #8888aa;
        }

        .placeholder small {
            color: #444466;
            font-size: 0.85rem;
        }

        .loading {
            color: #f7971e;
            text-align: center;
            padding: 40px 20px;
        }

        .loading span {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.4; transform: scale(1); }
        }

        /* === PUB === */
        .ads-section {
            margin-top: 28px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444466;
            font-size: 0.85rem;
            text-align: center;
        }

        .ads-section span {
            color: #666688;
        }

        /* === FOOTER === */
        .footer {
            margin-top: 32px;
            text-align: center;
            color: #333355;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 24px;
        }

        .footer a {
            color: #f7971e;
            text-decoration: none;
        }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px;
                border-radius: 32px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .input-group input {
                min-width: 100%;
            }
            .input-group button {
                width: 100%;
                justify-content: center;
            }
            .generator-box {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- EN-TÊTE -->
        <div class="header">
            <span class="badge">✨ IA Puissance 2026</span>
            <h1>Générateur d'Images</h1>
            <p>Décris ce que tu veux voir, l'IA le crée en quelques secondes</p>
        </div>

        <!-- GÉNÉRATEUR -->
        <div class="generator-box">
            <label for="prompt">✍️ Que veux-tu générer ?</label>
            <div class="input-group">
                <input type="text" id="prompt" placeholder="Ex: un prince au coucher de soleil, style futuriste"/>
                <button onclick="generateImage()">🚀 Générer</button>
            </div>

            <!-- RÉSULTAT -->
            <div class="result-box" id="result">
                <div class="placeholder">
                    <span>🖼️</span>
                    <p>Ton image apparaîtra ici</p>
                    <small>Tape une description et clique sur Générer</small>
                </div>
            </div>
        </div>

        <!-- ZONE PUB -->
        <div class="ads-section" id="ad-container">
            <span>📢 Ajoute ton code PropellerAds ici</span>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            © 2026 — Fait avec ❤️ • <a href="#">IA Magique</a>
        </div>
    </div>

    <!-- ====== JAVASCRIPT ====== -->
    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const resultDiv = document.getElementById('result');

            if (!prompt) {
                resultDiv.innerHTML = `
                    <div class="placeholder">
                        <span>⚠️</span>
                        <p>Veuillez décrire une image</p>
                        <small>Ex: un coucher de soleil sur la plage</small>
                    </div>
                `;
                return;
            }

            // Affichage du chargement
            resultDiv.innerHTML = `
                <div class="loading">
                    <span>⏳</span>
                    <p>L'IA réfléchit...</p>
                    <small style="color:#444466;">Cela peut prendre quelques secondes</small>
                </div>
            `;

            try {
                // Utilisation de Craiyon (sans clé API)
                const response = await fetch('https://api.craiyon.com/v1/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                    })
                });

                if (!response.ok) {
                    // Si Craiyon ne fonctionne pas, on utilise une image de secours (Unsplash)
                    throw new Error('Craiyon indisponible');
                }

                const data = await response.json();
                const imageBase64 = data.images[0];

                resultDiv.innerHTML = `
                    <img src="data:image/png;base64,${imageBase64}" alt="Image générée par IA" />
                `;

            } catch (error) {
                console.warn('Erreur Craiyon, utilisation du fallback:', error);

                // === SOLUTION DE SECOURS : Image Unsplash ===
                // Si Craiyon ne marche pas, on génère une image avec Unsplash (gratuit, sans clé)
                const fallbackUrl = `https://source.unsplash.com/800x600/?${encodeURIComponent(prompt)}`;

                resultDiv.innerHTML = `
                    <img src="${fallbackUrl}" alt="Image générée" style="width:100%;border-radius:24px;" />
                `;
            }
        }
    </script>

</body>
</html>
